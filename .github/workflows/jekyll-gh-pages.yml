name: Deploy Jekyll site to GitHub Pages

on:
  # הפעלת האקשן בכל פעם שדוחפים קוד לענף main (אם הענף שלך נקרא master, שנה בהתאם)
  push:
    branches:["sand"]
  # מאפשר הפעלה ידנית של האקשן דרך ממשק גיטהאב
  workflow_dispatch:

# הגדרת הרשאות הנדרשות לפעולת הפריסה
permissions:
  contents: read
  pages: write
  id-token: write

# מניעת התנגשויות - ביטול פריסות מקבילות והבטחה שרק גרסה אחת עולה בכל פעם
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # שלב בניית האתר
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # שלב הפריסה ל-GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
